<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <style>
      .gold { fill: #c9a84c; }
      .gold-stroke { fill: none; stroke: #c9a84c; stroke-width: 1.2; }
      .text-main { font-family: 'Cormorant Garamond', 'Times New Roman', serif; fill: #c9a84c; }
      .text-script { font-family: 'Georgia', serif; fill: #c9a84c; font-style: italic; }
    </style>
  </defs>

  <!-- Outer circle -->
  <circle cx="150" cy="150" r="130" fill="none" stroke="#c9a84c" stroke-width="1.5"/>
  <circle cx="150" cy="150" r="124" fill="none" stroke="#c9a84c" stroke-width="0.5" stroke-dasharray="2 3"/>

  <!-- Crown -->
  <g transform="translate(150, 52)">
    <!-- Crown base -->
    <rect x="-28" y="12" width="56" height="14" rx="2" fill="#c9a84c"/>
    <!-- Crown points -->
    <polygon points="0,-18 6,-4 -6,-4" fill="#c9a84c"/>
    <polygon points="-20,-10 -14,2 -26,2" fill="#c9a84c"/>
    <polygon points="20,-10 26,2 14,2" fill="#c9a84c"/>
    <!-- Crown cross top -->
    <rect x="-1.5" y="-26" width="3" height="10" fill="#c9a84c"/>
    <rect x="-5" y="-20" width="10" height="3" fill="#c9a84c"/>
    <!-- Crown jewels -->
    <circle cx="0" cy="6" r="3" fill="#e8d49e"/>
    <circle cx="-14" cy="8" r="2" fill="#e8d49e"/>
    <circle cx="14" cy="8" r="2" fill="#e8d49e"/>
    <!-- Dots on crown base -->
    <circle cx="-20" cy="13" r="1.5" fill="#faf8f5"/>
    <circle cx="-10" cy="13" r="1.5" fill="#faf8f5"/>
    <circle cx="0" cy="13" r="1.5" fill="#faf8f5"/>
    <circle cx="10" cy="13" r="1.5" fill="#faf8f5"/>
    <circle cx="20" cy="13" r="1.5" fill="#faf8f5"/>
  </g>

  <!-- Left laurel branch -->
  <g transform="translate(150,150)">
    <path d="M-115,20 Q-105,10 -95,0" class="gold-stroke"/>
    <ellipse cx="-108" cy="8" rx="9" ry="5" transform="rotate(-40,-108,8)" class="gold-stroke"/>
    <ellipse cx="-100" cy="-2" rx="9" ry="5" transform="rotate(-50,-100,-2)" class="gold-stroke"/>
    <ellipse cx="-110" cy="20" rx="9" ry="5" transform="rotate(-30,-110,20)" class="gold-stroke"/>
    <ellipse cx="-118" cy="32" rx="9" ry="5" transform="rotate(-20,-118,32)" class="gold-stroke"/>
    <path d="M-115,20 Q-112,35 -105,48" class="gold-stroke"/>
    <ellipse cx="-112" cy="42" rx="9" ry="5" transform="rotate(10,-112,42)" class="gold-stroke"/>
    <ellipse cx="-106" cy="55" rx="9" ry="5" transform="rotate(20,-106,55)" class="gold-stroke"/>
    <path d="M-95,0 Q-88,-12 -78,-22" class="gold-stroke"/>
    <ellipse cx="-88" cy="-14" rx="8" ry="4.5" transform="rotate(-60,-88,-14)" class="gold-stroke"/>
    <ellipse cx="-76" cy="-24" rx="8" ry="4.5" transform="rotate(-65,-76,-24)" class="gold-stroke"/>
  </g>

  <!-- Right laurel branch (mirrored) -->
  <g transform="translate(150,150) scale(-1,1)">
    <path d="M-115,20 Q-105,10 -95,0" class="gold-stroke"/>
    <ellipse cx="-108" cy="8" rx="9" ry="5" transform="rotate(-40,-108,8)" class="gold-stroke"/>
    <ellipse cx="-100" cy="-2" rx="9" ry="5" transform="rotate(-50,-100,-2)" class="gold-stroke"/>
    <ellipse cx="-110" cy="20" rx="9" ry="5" transform="rotate(-30,-110,20)" class="gold-stroke"/>
    <ellipse cx="-118" cy="32" rx="9" ry="5" transform="rotate(-20,-118,32)" class="gold-stroke"/>
    <path d="M-115,20 Q-112,35 -105,48" class="gold-stroke"/>
    <ellipse cx="-112" cy="42" rx="9" ry="5" transform="rotate(10,-112,42)" class="gold-stroke"/>
    <ellipse cx="-106" cy="55" rx="9" ry="5" transform="rotate(20,-106,55)" class="gold-stroke"/>
    <path d="M-95,0 Q-88,-12 -78,-22" class="gold-stroke"/>
    <ellipse cx="-88" cy="-14" rx="8" ry="4.5" transform="rotate(-60,-88,-14)" class="gold-stroke"/>
    <ellipse cx="-76" cy="-24" rx="8" ry="4.5" transform="rotate(-65,-76,-24)" class="gold-stroke"/>
  </g>

  <!-- Bottom laurel tie -->
  <circle cx="150" cy="228" r="3" fill="#c9a84c"/>
  <line x1="138" y1="228" x2="147" y2="228" stroke="#c9a84c" stroke-width="1"/>
  <line x1="153" y1="228" x2="162" y2="228" stroke="#c9a84c" stroke-width="1"/>

  <!-- ROYAL text -->
  <text x="150" y="148" text-anchor="middle" class="text-main" font-size="38" font-weight="700" letter-spacing="6">ROYAL</text>

  <!-- WAY STORE text -->
  <text x="150" y="175" text-anchor="middle" class="text-main" font-size="22" font-weight="600" letter-spacing="5">WAY STORE</text>

  <!-- Decorative separator -->
  <line x1="100" y1="185" x2="200" y2="185" stroke="#c9a84c" stroke-width="0.8"/>
  <circle cx="150" cy="185" r="2.5" fill="#c9a84c"/>
  <circle cx="105" cy="185" r="1.5" fill="#c9a84c"/>
  <circle cx="195" cy="185" r="1.5" fill="#c9a84c"/>

  <!-- shein store script -->
  <text x="150" y="208" text-anchor="middle" class="text-script" font-size="18" letter-spacing="1">shein store</text>
</svg>
